name: Fetch Goodinfo Top Volume

on:
  workflow_dispatch:
  schedule:
    - cron: "10 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: goodinfo-top-volume
  cancel-in-progress: true
  
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data
        run: python scripts/fetch_goodinfo_top_volume.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goodinfo-top-volume-output
          path: |
            output/goodinfo_top_volume.json
            output/goodinfo_top_volume_error.txt
          if-no-files-found: ignore

      - name: Commit updated JSON
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add output/goodinfo_top_volume.json output/goodinfo_top_volume_error.txt || true

          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
            exit 0
          fi

          git commit -m "update goodinfo top volume data"

          git pull --rebase origin main
          git push origin main
